<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Countdown Cupra</title>

<style>
@font-face{
  font-family:"Cupra";
  src:url("Cupra-ExtraBold.woff") format("woff");
}

:root{
  --rojo:#db0000;
}

html,body{
  margin:0;
  background:black;
  color:var(--rojo);
  font-family:"Cupra",Arial,sans-serif;
  height:100%;
}

/* SOLO PARA PROBAR EN ORDENADOR */
body{
  zoom:3;
}

/* CONTENEDOR */
#contenedor{
  position:relative;
  width:256px;
  height:512px;
  margin:auto;
  background:black;
}

/* LOGO SUPERIOR */
#logoTop{
  position:absolute;
  top:20px;
  right:20px;
  width:80px;
}

#logoTop img{
  width:100%;
  display:block;
}

/* BLOQUE DIAS */
#bloqueDias{
  position:absolute;
  top:40px;
  left:30px;
}

#diasNumero{
  font-size:110px;
  line-height:0.8;
}

#diasTexto{
  font-size:30px;
  letter-spacing:4px;
  margin-top:10px;
}

/* RELOJ */
#reloj{
  position:absolute;
  top:250px;
  width:100%;
  left:0;
}

#tiempoWrap{
  position:relative;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:0 18px;
  box-sizing:border-box;
}

.bloqueTiempo{
  width:68px;
  text-align:center;
}

.numero{
  font-size:70px;
  line-height:1;
}

.label{
  margin-top:4px;
  font-size:16px;
  line-height:1;
  white-space:nowrap;
}

/* DOS PUNTOS */
.sep{
  position:absolute;
  top:8px;
  font-size:55px;
  line-height:1;
}

#sep1{
  left:82px;
}

#sep2{
  left:166px;
}

/* LOGO INFERIOR */
#logoBottom{
  position:absolute;
  bottom:30px;
  width:100%;
  text-align:center;
}

#logoBottom img{
  width:130px;
  display:inline-block;
}

/* ESTADO FINAL */
body.final #contenedor{
  display:none;
}

#logoFinal{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

#logoFinal img{
  width:180px;
}

body.final #logoFinal{
  display:block;
}
</style>
</head>

<body>

<div id="contenedor">

  <div id="logoTop">
    <img src="Logo_R.png" alt="Logo R">
  </div>

  <div id="bloqueDias">
    <div id="diasNumero">0</div>
    <div id="diasTexto">DAYS</div>
  </div>

  <div id="reloj">
    <div id="tiempoWrap">

      <div class="bloqueTiempo">
        <div class="numero" id="hh">00</div>
        <div class="label">HOURS</div>
      </div>

      <div class="bloqueTiempo">
        <div class="numero" id="mm">00</div>
        <div class="label">MINUTES</div>
      </div>

      <div class="bloqueTiempo">
        <div class="numero" id="ss">00</div>
        <div class="label">SECONDS</div>
      </div>

      <div class="sep" id="sep1">:</div>
      <div class="sep" id="sep2">:</div>

    </div>
  </div>

  <div id="logoBottom">
    <img src="Logo_Cupra.png" alt="Logo Cupra">
  </div>

</div>

<div id="logoFinal">
  <img src="Logo_Cupra.png" alt="Logo final">
</div>

<script>
const fechaObjetivo = new Date("2026-04-01T18:00:00").getTime();

function actualizar(){
  const ahora = new Date().getTime();
  const diferencia = fechaObjetivo - ahora;

  if(diferencia <= 0){
    document.body.classList.add("final");
    return;
  }

  const dias = Math.floor(diferencia/(1000*60*60*24));
  const horas = Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));
  const minutos = Math.floor((diferencia%(1000*60*60))/(1000*60));
  const segundos = Math.floor((diferencia%(1000*60))/1000);

  document.getElementById("diasNumero").textContent = dias;
  document.getElementById("hh").textContent = horas.toString().padStart(2,'0');
  document.getElementById("mm").textContent = minutos.toString().padStart(2,'0');
  document.getElementById("ss").textContent = segundos.toString().padStart(2,'0');
}

setInterval(actualizar,1000);
actualizar();
</script>

</body>
</html>
