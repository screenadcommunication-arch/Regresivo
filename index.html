<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=256, height=256, initial-scale=1">
<title>Cuenta atrás evento</title>

<style>

:root{
  --compensacionY: 0.50;
  --ajusteXContador: 25px;
  --ajusteXLogo: 0px;
}

html, body{
  margin:0;
  width:256px;
  height:256px;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
  color:white;
}

body{
  position:relative;
}

/* ESCENA */
#escena{
  position:absolute;
  left:50%;
  top:50%;
  width:256px;
  height:256px;
  transform:translate(-50%, -50%);
}

/* CONTADOR */
#contador{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  transition:opacity 0.5s ease;
  transform:translateX(var(--ajusteXContador)) translateY(-10px);
}

/* COMPENSACIÓN PANTALLA TRANSPARENTE */
.compY{
  transform:scaleY(var(--compensacionY));
  transform-origin:center center;
}

/* NÚMERO DE DÍAS */
#dias{
  font-size:110px;
  font-weight:bold;
  line-height:0.9;
  margin:0;
}

/* TEXTO DÍAS */
#textoDias{
  font-size:38px;
  letter-spacing:3px;
  margin-top:-18px;
  margin-bottom:-2px;
}

/* RELOJ */
#tiempo{
  font-size:46px;
  font-weight:bold;
  letter-spacing:2px;
  white-space:nowrap;
}

/* LOGO */
#logo{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  transition:opacity 0.8s ease;
  transform:translateX(var(--ajusteXLogo));
}

#logoWrap{
  width:240px;
  height:240px;
  display:flex;
  justify-content:center;
  align-items:center;
}

#logo img{
  max-width:100%;
  max-height:100%;
  width:auto;
  height:auto;
  object-fit:contain;
}

/* ESTADO FINAL */
body.final #contador{
  opacity:0;
}

body.final #logo{
  opacity:1;
}

</style>
</head>

<body>

<div id="escena">

  <div id="contador">
    <div id="dias" class="compY"></div>
    <div id="textoDias" class="compY"></div>
    <div id="tiempo" class="compY"></div>
  </div>

  <div id="logo">
    <div id="logoWrap" class="compY">
      <img src="logo.png" alt="Logo Cliente">
    </div>
  </div>

</div>

<script>

const fechaObjetivo = new Date("2026-03-12T15:40:00").getTime();

function actualizarContador(){
  const ahora = Date.now();
  const diferencia = fechaObjetivo - ahora;

  if(diferencia <= 0){
    document.body.classList.add("final");
    return;
  }

  const dias = -Math.floor(diferencia / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
  const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

  document.getElementById("dias").textContent = dias;
  document.getElementById("textoDias").textContent =
    Math.abs(dias) === 1 ? "DÍA" : "DÍAS";
  document.getElementById("tiempo").textContent =
    String(horas).padStart(2,'0') + ":" +
    String(minutos).padStart(2,'0') + ":" +
    String(segundos).padStart(2,'0');
}

actualizarContador();
setInterval(actualizarContador, 1000);

</script>

</body>
</html>
