<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=256, height=256, initial-scale=1">
<title>Cuenta atrás evento</title>

<style>

html, body{
margin:0;
width:256px;
height:256px;
background:black;
overflow:hidden;
font-family:Arial, sans-serif;
color:white;
}

#contador{
position:absolute;
width:256px;
height:256px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
transition:opacity 0.5s;
}

/* NUMERO DIAS */

#dias{
font-size:120px;
font-weight:bold;
line-height:0.9;
}

/* TEXTO DIAS */

#textoDias{
font-size:28px;
letter-spacing:3px;
margin-top:2px;
margin-bottom:10px;
}

/* RELOJ */

#tiempo{
font-size:48px;
font-weight:bold;
letter-spacing:3px;
}

/* LOGO */

#logo{
position:absolute;
width:256px;
height:256px;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
transform:scale(0.8);
transition:opacity 0.8s, transform 0.8s;
}

#logo img{
max-width:200px;
max-height:200px;
width:auto;
height:auto;
}

body.final #contador{
opacity:0;
}

body.final #logo{
opacity:1;
transform:scale(1);
}

</style>
</head>

<body>

<div id="contador">

<div id="dias"></div>
<div id="textoDias"></div>
<div id="tiempo"></div>

</div>

<div id="logo">
<img src="logo.png">
</div>

<script>

const fechaObjetivo = new Date("2026-03-11T18:10:00");

function actualizarContador(){

const ahora = new Date().getTime();
const diferencia = fechaObjetivo - ahora;

if(diferencia <= 0){
document.body.classList.add("final");
return;
}

const dias = -Math.floor(diferencia/(1000*60*60*24));

const horas = Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));
const minutos = Math.floor((diferencia%(1000*60*60))/(1000*60));
const segundos = Math.floor((diferencia%(1000*60))/1000);

document.getElementById("dias").innerHTML = dias;

document.getElementById("textoDias").innerHTML =
Math.abs(dias) === 1 ? "DÍA" : "DÍAS";

document.getElementById("tiempo").innerHTML =
horas.toString().padStart(2,'0') + ":" +
minutos.toString().padStart(2,'0') + ":" +
segundos.toString().padStart(2,'0');

}

setInterval(actualizarContador,1000);
actualizarContador();

</script>

</body>
</html>
