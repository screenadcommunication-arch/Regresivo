<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=256, height=512, initial-scale=1">
<title>Countdown Cupra</title>

<style>
@font-face{
  font-family:"Cupra";
  src:url("Cupra-ExtraBold.woff") format("woff");
}

:root{
  --rojo:#FF0000;
  --compY:0.50;
}

html,body{
  margin:0;
  width:256px;
  height:512px;
  background:black;
  overflow:hidden;
  color:var(--rojo);
  font-family:"Cupra", Arial, sans-serif;
}

#scene{
  position:relative;
  width:256px;
  height:512px;
  background:black;
  transform:scaleY(var(--compY));
  transform-origin:top center;
}

/* BLOQUE SUPERIOR: SOLO DÍAS, CENTRADO Y MÁS GRANDE */
#bloqueSuperior{
  position:absolute;
  top:20px;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

#bloqueDias{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  line-height:0.86;
}

#diasNumero{
  font-size:128px;
}

#diasTexto{
  font-size:32px;
  letter-spacing:4px;
  margin-top:4px;
}

/* RELOJ: SE MANTIENE COMO EN TU ÚLTIMA VERSIÓN */
#reloj{
  position:absolute;
  top:200px;
  width:245px;
}

#tiempo,
#labels{
  width:245px;
  display:grid;
  grid-template-columns:72px 16px 72px 16px 72px;
  justify-content:center;
  align-items:center;
  text-align:center;
}

#tiempo{
  font-size:50px;
  line-height:1;
}

#labels{
  margin-top:4px;
  font-size:14px;
  line-height:1;
}

.sep{
  font-size:44px;
}

/* LOGO INFERIOR NUEVO */
#logoBottom{
  position:absolute;
  bottom:34px;
  width:100%;
  text-align:center;
}

#logoBottom img{
  width:150px;
  height:auto;
  display:inline-block;
}

/* ESTADO FINAL */
body.final #scene{
  display:none;
}

#logoFinal{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scaleY(var(--compY));
  transform-origin:center center;
}

#logoFinal img{
  width:180px;
  height:auto;
  display:block;
}

body.final #logoFinal{
  display:block;
}
</style>
</head>

<body>

<div id="scene">

  <div id="bloqueSuperior">
    <div id="bloqueDias">
      <div id="diasNumero">0</div>
      <div id="diasTexto">DAYS</div>
    </div>
  </div>

  <div id="reloj">
    <div id="tiempo">
      <div id="hh">00</div>
      <div class="sep">:</div>
      <div id="mm">00</div>
      <div class="sep">:</div>
      <div id="ss">00</div>
    </div>

    <div id="labels">
      <div>HOURS</div>
      <div></div>
      <div>MINUTES</div>
      <div></div>
      <div>SECONDS</div>
    </div>
  </div>

  <div id="logoBottom">
    <img src="Logo_Cupra_New.png" alt="Logo Cupra">
  </div>

</div>

<div id="logoFinal">
  <img src="Logo_Cupra_New.png" alt="Logo final">
</div>

<script>
const fechaObjetivo = new Date("2026-04-09T18:00:00").getTime();

function actualizar(){
  const ahora = Date.now();
  const diferencia = fechaObjetivo - ahora;

  if(diferencia <= 0){
    document.body.classList.add("final");
    return;
  }

  const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
  const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

  document.getElementById("diasNumero").textContent = dias;
  document.getElementById("hh").textContent = horas.toString().padStart(2,'0');
  document.getElementById("mm").textContent = minutos.toString().padStart(2,'0');
  document.getElementById("ss").textContent = segundos.toString().padStart(2,'0');
}

setInterval(actualizar,1000);
actualizar();
</script>

</body>
</html>
