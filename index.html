<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=256, height=256, initial-scale=1">
<title>Countdown Cupra</title>

<style>
@font-face{
  font-family:"Cupra";
  src:url("Cupra-ExtraBold.woff") format("woff");
}

:root{
  --rojo:#FF0000;
  --compY:0.50; /* prueba 0.48 / 0.50 / 0.52 si quieres afinar */
}

html,body{
  margin:0;
  width:256px;
  height:256px;
  overflow:hidden;
  background:black;
  color:var(--rojo);
  font-family:"Cupra", Arial, sans-serif;
}

#scene{
  position:relative;
  width:256px;
  height:256px;
  overflow:hidden;
  background:black;
}

/* Compensación para el pitch 3.9 x 7.81 */
.compY{
  transform:scaleY(var(--compY));
  transform-origin:center center;
}

/* BLOQUE SUPERIOR */
#bloqueSuperior{
  position:absolute;
  top:18px;
  left:18px;
  right:18px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

#bloqueDias{
  display:flex;
  flex-direction:column;
  line-height:0.86;
}

#diasNumero{
  font-size:104px;
}

#diasTexto{
  font-size:28px;
  letter-spacing:3px;
  margin-top:4px;
}

#logoTop img{
  max-height:128px;
  width:auto;
  height:auto;
  display:block;
}

/* RELOJ */
#reloj{
  position:absolute;
  top:108px;
  width:256px;
}

#tiempo,
#labels{
  width:256px;
  display:grid;
  grid-template-columns:70px 16px 70px 16px 70px;
  justify-content:center;
  align-items:center;
  text-align:center;
}

#tiempo{
  font-size:60px;
  line-height:1;
}

#labels{
  margin-top:2px;
  font-size:13px;
  line-height:1;
}

.sep{
  font-size:44px;
}

/* LOGO INFERIOR */
#logoBottom{
  position:absolute;
  bottom:18px;
  width:100%;
  text-align:center;
}

#logoBottom img{
  width:96px;
  height:auto;
  display:inline-block;
}

/* ESTADO FINAL */
body.final #scene{
  display:none;
}

#logoFinal{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scaleY(var(--compY));
  transform-origin:center center;
}

#logoFinal img{
  width:150px;
  height:auto;
  display:block;
}

body.final #logoFinal{
  display:block;
}
</style>
</head>

<body>

<div id="scene">

  <div id="bloqueSuperior" class="compY">
    <div id="bloqueDias">
      <div id="diasNumero">0</div>
      <div id="diasTexto">DAYS</div>
    </div>

    <div id="logoTop">
      <img src="Logo_R.png" alt="Logo R">
    </div>
  </div>

  <div id="reloj" class="compY">
    <div id="tiempo">
      <div id="hh">00</div>
      <div class="sep">:</div>
      <div id="mm">00</div>
      <div class="sep">:</div>
      <div id="ss">00</div>
    </div>

    <div id="labels">
      <div>HOURS</div>
      <div></div>
      <div>MINUTES</div>
      <div></div>
      <div>SECONDS</div>
    </div>
  </div>

  <div id="logoBottom" class="compY">
    <img src="Logo_Cupra.png" alt="Logo Cupra">
  </div>

</div>

<div id="logoFinal">
  <img src="Logo_Cupra.png" alt="Logo final">
</div>

<script>
const fechaObjetivo = new Date("2026-04-01T18:00:00").getTime();

function actualizar(){
  const ahora = Date.now();
  const diferencia = fechaObjetivo - ahora;

  if(diferencia <= 0){
    document.body.classList.add("final");
    return;
  }

  const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
  const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

  document.getElementById("diasNumero").textContent = dias;
  document.getElementById("hh").textContent = horas.toString().padStart(2,'0');
  document.getElementById("mm").textContent = minutos.toString().padStart(2,'0');
  document.getElementById("ss").textContent = segundos.toString().padStart(2,'0');
}

setInterval(actualizar,1000);
actualizar();
</script>

</body>
</html>
