<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Countdown Cupra</title>

<style>

@font-face{
font-family:"Cupra";
src:url("Cupra-ExtraBold.otf") format("opentype");
}

:root{
--rojo:#db0000;
}

html,body{
margin:0;
background:black;
font-family:"Cupra",Arial,sans-serif;
color:var(--rojo);
height:100%;
}

/* SOLO PARA VERLO GRANDE EN ORDENADOR */
body{
zoom:3;
}

/* CONTENEDOR PRINCIPAL */

#contenedor{
position:relative;
width:256px;
height:512px;
margin:auto;
}

/* LOGO SUPERIOR */

#logoTop{
position:absolute;
top:20px;
right:20px;
width:90px;
}

#logoTop img{
width:100%;
}

/* BLOQUE DIAS */

#bloqueDias{
position:absolute;
top:40px;
left:30px;
}

#diasNumero{
font-size:110px;
line-height:0.8;
}

#diasTexto{
font-size:30px;
letter-spacing:4px;
margin-top:10px;
}

/* RELOJ */

#reloj{
position:absolute;
top:250px;
width:100%;
text-align:center;
}

#tiempo{
font-size:70px;
letter-spacing:4px;
}

#labels{
margin-top:10px;
font-size:18px;
letter-spacing:3px;
word-spacing:25px;
}

/* LOGO INFERIOR */

#logoBottom{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
}

#logoBottom img{
width:140px;
}

/* ESTADO FINAL */

body.final #contenedor{
display:none;
}

#logoFinal{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#logoFinal img{
width:180px;
}

body.final #logoFinal{
display:block;
}

</style>
</head>


<body>

<div id="contenedor">

<div id="logoTop">
<img src="Logo_R.png">
</div>

<div id="bloqueDias">
<div id="diasNumero">0</div>
<div id="diasTexto">DAYS</div>
</div>

<div id="reloj">

<div id="tiempo">00:00:00</div>

<div id="labels">
HOURS&nbsp;&nbsp;&nbsp;&nbsp;MINUTES&nbsp;&nbsp;&nbsp;&nbsp;SECONDS
</div>

</div>

<div id="logoBottom">
<img src="Logo_Cupra.png">
</div>

</div>


<div id="logoFinal">
<img src="Logo_Cupra.png">
</div>



<script>

/* FECHA DEL EVENTO */

const fechaObjetivo = new Date("2026-04-01T18:00:00").getTime();


function actualizar(){

const ahora = new Date().getTime();

const diferencia = fechaObjetivo - ahora;


/* EVENTO TERMINADO */

if(diferencia <= 0){

document.body.classList.add("final");
return;

}


const dias = Math.floor(diferencia/(1000*60*60*24));

const horas = Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));

const minutos = Math.floor((diferencia%(1000*60*60))/(1000*60));

const segundos = Math.floor((diferencia%(1000*60))/1000);


/* ACTUALIZAR DIAS */

document.getElementById("diasNumero").innerHTML = dias;


/* RELOJ */

document.getElementById("tiempo").innerHTML =
horas.toString().padStart(2,'0') + ":" +
minutos.toString().padStart(2,'0') + ":" +
segundos.toString().padStart(2,'0');

}

setInterval(actualizar,1000);

actualizar();

</script>

</body>
</html>
